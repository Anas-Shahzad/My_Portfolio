<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="icon" type="image/png" href="Main_P/icons8-portfolio-50.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* General Page Styling */
        body {
            background-color: #fff;
            font-family: 'Arvo', serif; /* Matches the serif style in the image */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        /* The 404 Number */
        h1.four-oh-four {
            font-size: 80px;
            margin: 0;
            font-weight: 500;
            letter-spacing: 2px;
            color: #2c3e50; /* Dark grey/black */
        }

        /* The Image Container */
        .illustration-box {
            height: 300px; /* Adjust based on your actual image size */
            width: 100%;
            background-position: center;
            background-repeat: no-repeat;
            margin: 20px auto;
            
            /* IMPORTANT: 
               Replace the URL below with the path to your caveman image.
               If you don't have the image file, you can crop it from your screenshot
               or find a similar "Caveman 404 GIF" online.
            */
            background-image: url('https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif'); 
            
            /* Note: I linked to the popular Dribbble gif that this design is based on 
               so you can see it working immediately. */
        }

        /* "Look like you're lost" Text */
        h3.title {
            font-size: 32px;
            margin: 10px 0;
            font-weight: 400;
        }

        /* Subtext */
        p.subtext {
            color: #7a7a7a;
            font-size: 16px;
            margin-bottom: 30px;
            font-family: sans-serif; /* Subtext is usually sans-serif */
        }

        /* The Green Button */
        .btn-home {
            background-color: #39ac31; /* Exact green match */
            color: #fff;
            padding: 12px 25px;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            border-radius: 2px; /* Slight rounded corners */
            transition: background 0.3s ease;
        }

        .btn-home:hover {
            background-color: #2e8b27;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1 class="four-oh-four">404</h1>

        <div class="illustration-box">
            </div>

        <h3 class="title">Look like you're lost</h3>

        <p class="subtext">the page you are looking for not available!</p>

        <a href="/#projects" class="btn-home">Go to Home</a>

    </div>

</body>
</html>
